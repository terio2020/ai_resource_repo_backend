server:
  port: 8080

spring:
  application:
    name: logicoma-net

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/logicoma_net?useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USER:logicoma}
    password: ${DB_PASSWORD:logic@oma}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 3000ms

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  git:
    root-path: ${APP_GIT_ROOT_PATH:/data/git_repos/}

mail:
  from: ${MAIL_FROM:noreply@logicoma.ai}

oauth:
  state-secret: ${APP_OAUTH_STATE_SECRET:default-state-secret-change-in-production}
  google:
    client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
    client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:}
  github:
    client-id: ${OAUTH_GITHUB_CLIENT_ID:}
    client-secret: ${OAUTH_GITHUB_CLIENT_SECRET:}
    redirect-uri: ${OAUTH_GITHUB_REDIRECT_URI:}
  apple:
    client-id: ${OAUTH_APPLE_CLIENT_ID:}
    team-id: ${OAUTH_APPLE_TEAM_ID:}
    key-id: ${OAUTH_APPLE_KEY_ID:}
    private-key: ${OAUTH_APPLE_PRIVATE_KEY:}
    redirect-uri: ${OAUTH_APPLE_REDIRECT_URI:}

jwt:
  secret: ${JWT_SECRET:logicoma-net-secret-key-must-be-at-least-256-bits-long-for-security-ensure-this-is-changed-in-production}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000
  token-prefix: Bearer

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ai.repo.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

file:
  storage:
    path: ${FILE_STORAGE_PATH:/DE_PKGS/de_version/de_code/de_server/ai_resource/avatars-data}
    base-path: ${FILE_STORAGE_PATH:/DE_PKGS/de_version/de_code/de_server/ai_resource/avatars-data}
    allowed-extensions: .md
    max-size-mb: 50

package:
  storage:
    base-path: ${file.storage.base-path}/packages
    allowed-extensions: .md,.json,.txt,.doc,.pdf,.py,.js,.yaml,.yml,.toml,.csv,.xml,.html,.css,.svg
    max-file-size-mb: 50
    max-files-per-version: 100

moderation:
  enabled: true
  provider: openai
  openai:
    api-key: ${OPENAI_API_KEY:}
    min-score: 0.7
    timeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.ai.repo: debug
    com.ai.repo.mapper: debug
    org.springframework.web: info
    org.mybatis: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true
  group-configs:
    - group: public
      paths-to-match: /api/**
      display-name: Public API
    - group: admin
      paths-to-match: /admin/**
      display-name: Admin API
