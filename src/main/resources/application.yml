server:
  port: 8080

spring:
  application:
    name: ai-resource-repo
  
  datasource:
    url: jdbc:mysql://localhost:3306/ai_resource_repo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: dev
    password: dev@123456
    driver-class-name: com.mysql.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

file:
  storage:
    path: /data/files

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.ai.repo: debug
    org.springframework.web: info
